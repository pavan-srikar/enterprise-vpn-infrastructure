name: Infrastructure Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-bash:
    name: Bash Lint (ShellCheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck — syntax + best practices
        run: |
          shellcheck -S warning scripts/setup-wireguard.sh
          shellcheck -S warning scripts/add-peer.sh
          shellcheck -S warning scripts/generate-qr.sh
          shellcheck -S warning scripts/remove-peer.sh

  validate-terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform Init (local backend)
        run: terraform init -backend=false
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

  check-structure:
    name: Repo Structure Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          test -f README.md                            || (echo "Missing README.md" && exit 1)
          test -f .gitignore                           || (echo "Missing .gitignore" && exit 1)
          test -d docs                                 || (echo "Missing docs/" && exit 1)
          test -d scripts                              || (echo "Missing scripts/" && exit 1)
          test -d configs                              || (echo "Missing configs/" && exit 1)
          test -d terraform                            || (echo "Missing terraform/" && exit 1)
          test -f configs/clients/client.conf.example || (echo "Missing client config example" && exit 1)
          test -f configs/server/wg0.conf.example     || (echo "Missing server config example" && exit 1)

      - name: Verify no secrets leaked
        run: |
          ! grep -r "PRIVATE" configs/ --include="*.conf" --include="*.key" \
            || (echo "[FAIL] Possible private key in configs/" && exit 1)
          ! find . -name "*.tfstate" -not -path "./.git/*" \
            | grep -q . \
            || (echo "[FAIL] tfstate file committed" && exit 1)
          ! find . -name "*.pem" -not -path "./.git/*" \
            | grep -q . \
            || (echo "[FAIL] .pem file committed" && exit 1)